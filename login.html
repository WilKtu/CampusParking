<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Parking</title>
    <link rel="stylesheet" href="CSS/login.css"> <!-- Asegúrate de tener un archivo CSS -->
</head>
<body>
    <nav>
        <ul>
            <li><a href="registro.html">Registro</a></li>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="mapaestacionamiento.html">Mapa de Estacionamiento</a></li>
        </ul>
    </nav>
    <div class="login-container">
        <h1>Campus Parking</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="123" required>
            </div>
            <button type="submit" class="login-btn">Iniciar Sesión</button>
            <p class="error-message" id="errorMessage"></p>
        </form>
    </div>

</body>
</html>
