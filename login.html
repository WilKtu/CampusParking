<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Img/parkfavi.png" type="image/x-icon">
    <link rel="stylesheet" href="CSS/login.css">
    <title>Login - CampusParking</title>
</head>
<body class="login-page">
    <div class="back-nav">
        <a href="Index.html"> Volver al Inicio</a>
    </div>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i>🅿️</i>
                <h1>Acceso Clientes</h1>
                <p>Gestiona tus espacios y vehículos</p>
            </div>
            
            <form action="#">
                <div class="input-group">
                    <label for="user">Usuario</label>
                    <input type="user" id="user" placeholder="user.example" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="login-options">
               
                
                <button type="submit" class="btn-login">Entrar al Parqueo</button>
            </form>
            
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
