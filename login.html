<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Campus Parking</title>
    <link rel="stylesheet" href="CSS/login.css"> <!-- Asegúrate de tener un archivo CSS -->
</head>
<body>
    <div class="login-container">
        <h1>Campus Parking</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="admin@campusparking.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Admin123" required>
            </div>
            <button type="submit" class="login-btn">Iniciar Sesión</button>
            <p class="error-message" id="errorMessage"></p>
        </form>
    </div>

    <script>
        // Datos del usuario inicial
        const adminUser = {
            email: "admin@campusparking.com",
            password: "Admin123"
        };

        // Manejo del formulario
        const loginForm = document.getElementById("loginForm");
        const errorMessage = document.getElementById("errorMessage");

        loginForm.addEventListener("submit", function(event) {
            event.preventDefault(); // Evita el envío del formulario

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Verifica las credenciales
            if (email === adminUser.email && password === adminUser.password) {
                alert("Inicio de sesión exitoso");
                // Aquí puedes redirigir al usuario a otra página
                window.location.href = "dashboard.html"; // Cambia a la página deseada
            } else {
                errorMessage.textContent = "Correo o contraseña incorrectos.";
            }
        });
    </script>
</body>
</html>
