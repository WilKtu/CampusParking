<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/registro.css">
    <title>Registrar Auto - CampusParking</title>
</head>
<body class="registro-page">
    <div class="back-nav">
        <a href="Index.html">Volver al Inicio</a>
    </div>

    <main class="registro-container">
        <!-- Formulario de Registro -->
        <section class="form-section">
            <div class="registro-box">
                <h2>Registrar Vehículo</h2>
                <p>Ingresa los datos para asignar un espacio</p>
                
                <form>
                    <div class="input-group">
                        <label>Placa del Vehículo</label>
                        <input type="text" placeholder="P-000ABC" required>
                    </div>
                    <div class="input-group">
                        <label>Marca / Modelo</label>
                        <input type="text" placeholder="Toyota Hilux" required>
                    </div>
                    <div class="input-group">
                        <label>Color</label>
                        <input type="text" placeholder="Gris Policromado">
                    </div>
                    <div class="input-group">
                        <label>Espacio Seleccionado</label>
                        <input type="text" id="selected-slot" placeholder="Toca un espacio en el mapa" readonly>
                    </div>
                    <button type="submit" class="btn-login">Confirmar Registro</button>
                </form>
            </div>
        </section>

        <!-- Croquis de Espacios -->
        <section class="map-section">
            <h3>Mapa de Disponibilidad (Nivel 1)</h3>
            <div class="parking-map">
                <!-- Pasillo central -->
                <div class="road"></div>
                
                <!-- Espacios de parqueo -->
                <div class="slots-container">
                    <!-- Fila Superior -->
                    <div class="slot occupied" data-id="A1">A1</div>
                    <div class="slot available" data-id="A2">A2</div>
                    <div class="slot available" data-id="A3">A3</div>
                    <div class="slot occupied" data-id="A4">A4</div>
                    <div class="slot available" data-id="A5">A5</div>
                    
                    <!-- Fila Inferior -->
                    <div class="slot available" data-id="B1">B1</div>
                    <div class="slot available" data-id="B2">B2</div>
                    <div class="slot occupied" data-id="B3">B3</div>
                    <div class="slot available" data-id="B4">B4</div>
                    <div class="slot available" data-id="B5">B5</div>
                </div>
            </div>
            <div class="map-legend">
                <span class="legend-item"><i class="box available"></i> Libre</span>
                <span class="legend-item"><i class="box occupied"></i> Ocupado</span>
            </div>
        </section>
    </main>
</body>
</html>
