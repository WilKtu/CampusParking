<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/mapa.css">
    <title>Mapa de Estacionamiento</title>
</head>
<body>
    <h1>Mapa de Estacionamiento</h1>
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color car"></div>
            <span>Autos</span>
        </div>
        <div class="legend-item">
            <div class="legend-color motorcycle"></div>
            <span>Motocicletas</span>
        </div>
    </div>
    <div class="parking-lot">
        <!-- Espacios para autos (75) -->
        <!-- Genera 75 espacios para autos -->
        <div class="space car">A1</div>
        <div class="space car">A2</div>
        <div class="space car">A3</div>
        <div class="space car">A4</div>
        <div class="space car">A5</div>
        <div class="space car">A6</div>
        <div class="space car">A7</div>
        <div class="space car">A8</div>
        <div class="space car">A9</div>
        <div class="space car">A10</div>
        <!-- Repite hasta 75 espacios -->
        <!-- Espacios para motocicletas (25) -->
        <div class="space motorcycle">M1</div>
        <div class="space motorcycle">M2</div>
        <div class="space motorcycle">M3</div>
        <div class="space motorcycle">M4</div>
        <div class="space motorcycle">M5</div>
        <!-- Repite hasta 25 espacios -->
    </div>
</body>
</html>
